<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Instant AR Menu</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }

    /* The model acts as the background */
    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
    }

    /* Hide the default small AR button */
    model-viewer::part(default-ar-button) { display: none; }

    /* Full-screen invisible touch layer */
    #ar-trigger {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5); /* Dim the background slightly */
      transition: opacity 0.5s;
      cursor: pointer;
    }

    .instruction-ui {
      text-align: center;
      color: white;
      pointer-events: none; /* Let touches pass through to the trigger div */
    }

    .icon-pulse {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.8; }
      70% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }

    h2 { font-weight: 300; letter-spacing: 1px; }
  </style>
</head>
<body>

  <div id="ar-trigger">
    <div class="instruction-ui">
      <svg class="icon-pulse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
        <line x1="12" y1="22.08" x2="12" y2="12"></line>
      </svg>
      <h2>TAP ANYWHERE</h2>
      <p>to place in your room</p>
    </div>
  </div>

  <model-viewer 
    id="mv"
    src="pizza.glb" 
    ios-src="pizza.usdz"
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    auto-rotate 
    shadow-intensity="1">
  </model-viewer>

  <script>
    const mv = document.querySelector('#mv');
    const trigger = document.querySelector('#ar-trigger');

    // The "Magic" Step:
    // We listen for any touch/click on the screen. 
    // Because the user touched the screen, the browser allows us to launch AR.
    trigger.addEventListener('click', () => {
      // 1. Launch AR immediately
      mv.activateAR();
      
      // 2. Hide the UI so if they come back out of AR, the model is clear
      trigger.style.opacity = '0';
      setTimeout(() => trigger.style.display = 'none', 500);
    });

    // If the model fails to enter AR for some reason, show the UI again
    mv.addEventListener('ar-status', (event) => {
      if (event.detail.status === 'not-presenting') {
        trigger.style.display = 'flex';
        trigger.style.opacity = '1';
      }
    });
  </script>
</body>
</html>
